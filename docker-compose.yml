version: '3.8'

services:

  mysql-clientes:
    image: mysql:8
    container_name: mysql-clientes
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: clientes_db
    ports:
      - "3307:3306"

  mysql-habitaciones:
    image: mysql:8
    container_name: mysql-habitaciones
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: habitaciones_db
    ports:
      - "3308:3306"

  mysql-reservas:
    image: mysql:8
    container_name: mysql-reservas
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: reservas_db
    ports:
      - "3309:3306"